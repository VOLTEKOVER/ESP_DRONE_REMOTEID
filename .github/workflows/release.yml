name: Release Firmware

on:
  push:
    tags:
      - 'v*'

env:
  CCACHE_DIR: /root/.ccache

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('**/sdkconfig', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ccache-${{ matrix.target }}-
            ccache-

      - name: Set target and build
        run: |
          . /opt/esp/idf/export.sh > /dev/null 2>&1
          git config --global --add safe.directory "$(pwd)" > /dev/null 2>&1
          idf.py set-target ${{ matrix.target }}
          echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_CUSTOM_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y" >> sdkconfig
          if [ "${{ matrix.target }}" != "esp32" ]; then
            echo "CONFIG_BT_NIMBLE_ENABLED=y" >> sdkconfig
          fi
          export CCACHE_BASEDIR="$PWD"
          idf.py build
        shell: bash

      - name: Collect artifacts
        run: |
          mkdir -p release/${{ matrix.target }}
          cp build/bootloader/bootloader.bin release/${{ matrix.target }}/
          cp build/partition_table/partition-table.bin release/${{ matrix.target }}/
          cp build/esp32-remote-id-scanner.bin release/${{ matrix.target }}/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: release/

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Prepare release assets
        run: |
          mkdir -p release/firmware
          for dir in artifacts/firmware-*/; do
            target=$(basename "$dir" | sed 's/firmware-//')
            cp -r "$dir/$target" "release/firmware/$target"
          done
          cat > release/firmware/manifest.json << EOF
          {
            "name": "ESP Remote ID",
            "version": "${{ env.VERSION }}",
            "home_url": "https://valeriocomo.github.io/ESP32_DRONE_ID",
            "config_url": "http://192.168.4.1",
            "builds": [
              { "chipFamily": "ESP32", "parts": [
                { "path": "firmware/esp32/bootloader.bin", "offset": 0x1000 },
                { "path": "firmware/esp32/partition-table.bin", "offset": 0x8000 },
                { "path": "firmware/esp32/esp32-remote-id-scanner.bin", "offset": 0x11000 }
              ]},
              { "chipFamily": "ESP32-S3", "parts": [
                { "path": "firmware/esp32s3/bootloader.bin", "offset": 0x0 },
                { "path": "firmware/esp32s3/partition-table.bin", "offset": 0x8000 },
                { "path": "firmware/esp32s3/esp32-remote-id-scanner.bin", "offset": 0x11000 }
              ]},
              { "chipFamily": "ESP32-C3", "parts": [
                { "path": "firmware/esp32c3/bootloader.bin", "offset": 0x0 },
                { "path": "firmware/esp32c3/partition-table.bin", "offset": 0x8000 },
                { "path": "firmware/esp32c3/esp32-remote-id-scanner.bin", "offset": 0x11000 }
              ]}
            ]
          }
          EOF
          cd release && zip -r firmware-${{ env.VERSION }}.zip firmware/
        shell: bash

      - name: Generate release notes
        run: |
          VERSION=${{ env.VERSION }}
          cat > release-notes.md << EOF
          # ESP Remote ID v${VERSION}

          Open DroneID transmitter for ESP32 — ASTM F3411-22a / ASD-STAN prEN 4709-002.

          **Targets:** ESP32 · ESP32-S3 · ESP32-C3

          ---

          ## 📥 Downloads

          | File | Description |
          |------|-------------|
          | \`firmware-${VERSION}.zip\` | All targets (bootloader + partition + firmware) |
          | \`manifest.json\` | WebSerial installer manifest |

          > 💡 Flash via browser at https://valeriocomo.github.io/ESP32_DRONE_ID/

          ## ✨ What's Changed
          EOF

          PREV=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV" ]; then
            echo "" >> release-notes.md
            echo "*(initial release)*" >> release-notes.md
          else
            echo "" >> release-notes.md
            echo "### 🚀 Features" >> release-notes.md
            git log "$PREV.." --grep="^feat" --format="  - %s" >> release-notes.md || true
            echo "" >> release-notes.md
            echo "### 🐛 Fixes" >> release-notes.md
            git log "$PREV.." --grep="^fix" --format="  - %s" >> release-notes.md || true
            echo "" >> release-notes.md
            echo "### 🛠 Improvements" >> release-notes.md
            git log "$PREV.." --grep="^improve\|^perf\|^refactor\|^optimize" -i --format="  - %s" >> release-notes.md || true
            echo "" >> release-notes.md
            echo "### 📚 Documentation" >> release-notes.md
            git log "$PREV.." --grep="^docs\|^readme\|^convert" -i --format="  - %s" >> release-notes.md || true
            echo "" >> release-notes.md
            echo "### 🧹 Chores" >> release-notes.md
            git log "$PREV.." --grep="^chore\|^cleanup\|^remove\|^rm\b" -i --format="  - %s" >> release-notes.md || true
            echo "" >> release-notes.md
            echo "### 🔄 Full Commit Log" >> release-notes.md
            echo '```' >> release-notes.md
            git log --oneline "$PREV.." >> release-notes.md
            echo '```' >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "_Full documentation at https://valeriocomo.github.io/ESP32_DRONE_ID/_" >> release-notes.md
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ESP Remote ID v${{ env.VERSION }}
          body_path: release-notes.md
          files: |
            release/firmware-${{ env.VERSION }}.zip
            release/firmware/manifest.json
