name: Release Firmware

on:
  push:
    tags:
      - 'v*'

env:
  CCACHE_DIR: /root/.ccache

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('**/sdkconfig', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ccache-${{ matrix.target }}-
            ccache-

      - name: Set target and build
        run: |
          . /opt/esp/idf/export.sh > /dev/null 2>&1
          git config --global --add safe.directory "$(pwd)" > /dev/null 2>&1
          idf.py set-target ${{ matrix.target }}
          echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_CUSTOM_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y" >> sdkconfig
          if [ "${{ matrix.target }}" != "esp32" ]; then
            echo "CONFIG_BT_NIMBLE_ENABLED=y" >> sdkconfig
          fi
          export CCACHE_BASEDIR="$PWD"
          idf.py build
        shell: bash

      - name: Collect artifacts
        run: |
          mkdir -p release/${{ matrix.target }}
          cp build/bootloader/bootloader.bin release/${{ matrix.target }}/
          cp build/partition_table/partition-table.bin release/${{ matrix.target }}/
          cp build/esp32-remote-id-scanner.bin release/${{ matrix.target }}/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.target }}
          path: release/

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/firmware-*/; do
            target=$(basename "$dir" | sed 's/firmware-//')
            cp -r "$dir/$target" "release/$target"
            cd release && zip -r "firmware-$target-${{ env.VERSION }}.zip" "$target/" && cd ..
          done
          # Build full firmware tree for Pages deployment
          mkdir -p release/firmware
          for dir in artifacts/firmware-*/; do
            target=$(basename "$dir" | sed 's/firmware-//')
            cp -r "$dir/$target" "release/firmware/$target"
          done
        shell: bash

      - name: Generate manifest.json (release)
        run: |
          python3 -c "
          import json, os
          manifest = {
            'name': 'ESP Remote ID',
            'version': os.environ['VERSION'],
            'home_url': 'https://voltekover.github.io/ESP32_DRONE_ID',
            'config_url': 'http://192.168.4.1',
            'new_install_improv_wait_time': 0,
            'builds': [
              { 'chipFamily': 'ESP32', 'parts': [
                { 'path': 'firmware/esp32/bootloader.bin', 'offset': 0x1000 },
                { 'path': 'firmware/esp32/partition-table.bin', 'offset': 0x8000 },
                { 'path': 'firmware/esp32/esp32-remote-id-scanner.bin', 'offset': 0x20000 }
              ]},
              { 'chipFamily': 'ESP32-S3', 'parts': [
                { 'path': 'firmware/esp32s3/bootloader.bin', 'offset': 0x0 },
                { 'path': 'firmware/esp32s3/partition-table.bin', 'offset': 0x8000 },
                { 'path': 'firmware/esp32s3/esp32-remote-id-scanner.bin', 'offset': 0x20000 }
              ]},
              { 'chipFamily': 'ESP32-C3', 'parts': [
                { 'path': 'firmware/esp32c3/bootloader.bin', 'offset': 0x0 },
                { 'path': 'firmware/esp32c3/partition-table.bin', 'offset': 0x8000 },
                { 'path': 'firmware/esp32c3/esp32-remote-id-scanner.bin', 'offset': 0x20000 }
              ]}
            ]
          }
          with open('release/firmware/manifest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          "
        shell: bash

      - name: Generate release notes
        run: |
          VERSION=${{ env.VERSION }}
          cat > release-notes.md << EOF
          # ESP Remote ID v${VERSION}

          Open DroneID transmitter for ESP32 — ASTM F3411-22a / ASD-STAN prEN 4709-002.

          **Targets:** ESP32 · ESP32-S3 · ESP32-C3

          ---

          ## 📥 Downloads

          | File | Description |
          |------|-------------|
          | \`firmware-esp32-${VERSION}.zip\` | ESP32 target (bootloader + partition + firmware) |
          | \`firmware-esp32s3-${VERSION}.zip\` | ESP32-S3 target (bootloader + partition + firmware) |
          | \`firmware-esp32c3-${VERSION}.zip\` | ESP32-C3 target (bootloader + partition + firmware) |
          | \`manifest.json\` | WebSerial installer manifest |

          > 💡 Flash via browser at https://voltekover.github.io/ESP32_DRONE_ID/

          ## ✨ What's Changed
          EOF

          PREV=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV" ]; then
            echo "" >> release-notes.md
            echo "*(initial release)*" >> release-notes.md
          else
            echo "" >> release-notes.md
            git log "$PREV.." --format="  - %s" >> release-notes.md || true
          fi

          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "_Full documentation at https://voltekover.github.io/ESP32_DRONE_ID/_" >> release-notes.md
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ESP Remote ID v${{ env.VERSION }}
          body_path: release-notes.md
          files: |
            release/firmware-esp32-${{ env.VERSION }}.zip
            release/firmware-esp32s3-${{ env.VERSION }}.zip
            release/firmware-esp32c3-${{ env.VERSION }}.zip
            release/firmware/manifest.json

      - name: Prepare Pages deploy
        run: |
          mkdir -p docs/firmware
          cp -r release/firmware/* docs/firmware/
          cp -r images docs/
          # Generate manifest.json in docs/ for Pages
          python3 -c "
          import json, os
          manifest = {
            'name': 'ESP Remote ID',
            'version': os.environ['VERSION'],
            'home_url': 'https://voltekover.github.io/ESP32_DRONE_ID',
            'config_url': 'http://192.168.4.1',
            'new_install_improv_wait_time': 0,
            'builds': [
              { 'chipFamily': 'ESP32', 'parts': [
                { 'path': 'firmware/esp32/bootloader.bin', 'offset': 0x1000 },
                { 'path': 'firmware/esp32/partition-table.bin', 'offset': 0x8000 },
                { 'path': 'firmware/esp32/esp32-remote-id-scanner.bin', 'offset': 0x20000 }
              ]},
              { 'chipFamily': 'ESP32-S3', 'parts': [
                { 'path': 'firmware/esp32s3/bootloader.bin', 'offset': 0x0 },
                { 'path': 'firmware/esp32s3/partition-table.bin', 'offset': 0x8000 },
                { 'path': 'firmware/esp32s3/esp32-remote-id-scanner.bin', 'offset': 0x20000 }
              ]},
              { 'chipFamily': 'ESP32-C3', 'parts': [
                { 'path': 'firmware/esp32c3/bootloader.bin', 'offset': 0x0 },
                { 'path': 'firmware/esp32c3/partition-table.bin', 'offset': 0x8000 },
                { 'path': 'firmware/esp32c3/esp32-remote-id-scanner.bin', 'offset': 0x20000 }
              ]}
            ]
          }
          with open('docs/manifest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          "
        shell: bash

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs
          overwrite: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
