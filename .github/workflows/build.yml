name: Build Firmware

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'images/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set target and build
        run: |
          idf.py set-target ${{ matrix.target }}
          idf.py build
        shell: bash

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp build/bootloader/bootloader.bin artifacts/${{ matrix.target }}/
          cp build/partition_table/partition-table.bin artifacts/${{ matrix.target }}/
          cp build/esp32-remote-id-scanner.bin artifacts/${{ matrix.target }}/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: artifacts/
