name: Build Firmware

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'images/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set target and build
        run: |
          . /opt/esp/idf/export.sh > /dev/null 2>&1
          git config --global --add safe.directory "$(pwd)" > /dev/null 2>&1
          idf.py set-target ${{ matrix.target }}
          echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_CUSTOM_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y" >> sdkconfig
          idf.py build
        shell: bash

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp build/bootloader/bootloader.bin artifacts/${{ matrix.target }}/
          cp build/partition_table/partition-table.bin artifacts/${{ matrix.target }}/
          cp build/esp32-remote-id-scanner.bin artifacts/${{ matrix.target }}/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: artifacts/
