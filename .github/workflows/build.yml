name: Build Firmware

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'images/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CCACHE_DIR: /root/.ccache

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('**/sdkconfig', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ccache-${{ matrix.target }}-
            ccache-

      - name: Set target and build
        run: |
          . /opt/esp/idf/export.sh > /dev/null 2>&1
          git config --global --add safe.directory "$(pwd)" > /dev/null 2>&1
          idf.py set-target ${{ matrix.target }}
          echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_CUSTOM_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y" >> sdkconfig
          if [ "${{ matrix.target }}" != "esp32" ]; then
            echo "CONFIG_BT_NIMBLE_ENABLED=y" >> sdkconfig
          fi
          export CCACHE_BASEDIR="$PWD"
          idf.py build
        shell: bash

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp build/bootloader/bootloader.bin artifacts/${{ matrix.target }}/
          cp build/partition_table/partition-table.bin artifacts/${{ matrix.target }}/
          cp build/esp32-remote-id-scanner.bin artifacts/${{ matrix.target }}/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: artifacts/

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare firmware directory
        run: |
          for dir in downloaded-artifacts/firmware-*/; do
            target=$(basename "$dir" | sed 's/firmware-//')
            mkdir -p "docs/firmware/$target"
            cp -r "$dir/$target/"* "docs/firmware/$target/"
          done
          ls -la docs/firmware/*/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
