openapi: "3.0.0"
info:
  title: ESP Remote ID Web API
  version: "1.0.0-beta"
  description: |
    REST API for configuring and controlling the ESP32 Remote ID Transmitter.
    Served on the ESP32's WiFi AP (http://192.168.4.1).
paths:
  /api/config:
    get:
      summary: Get current configuration
      responses:
        '200':
          description: Configuration object
    post:
      summary: Set configuration (requires X-Signature when locked)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
      responses:
        '200':
          description: Configuration updated
  /api/status:
    get:
      summary: Get runtime status (GPS, state, counters)
      responses:
        '200':
          description: Status object
  /api/command:
    post:
      summary: Execute command (restart, reboot, reset, factory)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  enum: [restart, reboot, reset, factory]
      responses:
        '200':
          description: Command accepted
  /api/logs:
    get:
      summary: Stream real-time logs (WebSocket upgrade)
      responses:
        '101':
          description: WebSocket upgrade
  /update:
    post:
      summary: Upload firmware OTA update
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                firmware:
                  type: string
                  format: binary
      responses:
        '200':
          description: Update OK, rebooting
  /factory_reset:
    post:
      summary: Erase NVS and reboot
      responses:
        '200':
          description: Resetting
  /rollback:
    post:
      summary: Rollback to previous firmware partition
      responses:
        '200':
          description: Rolling back
components:
  schemas:
    Config:
      type: object
      properties:
        uas_id:
          type: string
        operator_id:
          type: string
        ua_type:
          type: integer
        id_type:
          type: integer
        tx_modes:
          type: integer
        wifi_channel:
          type: integer
        wifi_power_dbm:
          type: number
        ble4_power_dbm:
          type: number
        lock_level:
          type: integer
